<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVY · Internetworks Assistant</title>


  <style>
    :root {
  
      --bg:          #0b0d0c;
      --bg-2:        #0e110f;
      --surface:     #15191700;
      --surface-2:   #161a18;
      --surface-3:   #1b201d;
      --line:        rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text:        #e9ece9;
      --text-dim:    #9aa39c;
      --text-faint:  #6c756e;
      --accent:      #7fae4e;   /* leaf green (logo) */
      --accent-soft: #9ccb6a;
      --accent-glow: rgba(127, 174, 78, 0.16);
      --danger:      #d98a6a;

      --sidebar-w: 280px;
      --radius:    16px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
              Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .app { display: flex; height: 100dvh; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      border-right: 1px solid var(--line);
      background: var(--bg-2);
      display: flex;
      flex-direction: column;
      padding: 22px 18px;
      gap: 18px;
      z-index: 30;
    }

    .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .logo-card {
      width: 124px; height: 124px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: radial-gradient(120% 120% at 50% 20%, rgba(127,174,78,0.07), transparent 70%);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .25s ease, transform .25s ease;
    }
    .logo-card:hover { border-color: var(--line-strong); }
    .logo-card img { width: 86%; height: 86%; object-fit: contain; }
    .wordmark {
      font-size: 13px; letter-spacing: 0.42em; font-weight: 600;
      color: var(--text); text-indent: 0.42em; /* optical centering for tracking */
    }

    .new-chat {
      margin-top: 4px;
      display: flex; align-items: center; gap: 10px;
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      font: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease;
    }
    .new-chat:hover { background: var(--surface-2); border-color: var(--line-strong); }
    .new-chat svg { width: 16px; height: 16px; color: var(--text-dim); }

    .nav { margin-top: auto; display: flex; flex-direction: column; gap: 2px; }
    .nav a {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 12px;
      border-radius: 11px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px; font-weight: 500;
      transition: background .15s ease, color .15s ease;
    }
    .nav a:hover { background: var(--surface-2); }
    .nav a:hover svg { color: var(--accent-soft); }
    .nav svg { width: 20px; height: 20px; color: var(--text-dim); flex: 0 0 20px; transition: color .15s ease; }

    /* ---------- Main ---------- */
    .main { flex: 1 1 auto; position: relative; display: flex; flex-direction: column; min-width: 0; }

    /* ambient glow behind composer */
    .main::before {
      content: ""; position: absolute; left: 50%; bottom: 14%;
      width: min(680px, 80%); height: 320px; transform: translateX(-50%);
      background: radial-gradient(60% 60% at 50% 50%, var(--accent-glow), transparent 70%);
      filter: blur(20px); pointer-events: none; opacity: .9;
    }

    .topbar {
      display: none;
      align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--line);
    }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--line); background: transparent;
      color: var(--text); cursor: pointer;
    }
    .icon-btn svg { width: 18px; height: 18px; }

    /* Conversation scroll area */
    .stream {
      flex: 1 1 auto; overflow-y: auto;
      display: flex; flex-direction: column;
      padding: 28px 20px 0;
      scroll-behavior: smooth;
    }
    .stream-inner { width: 100%; max-width: 760px; margin: 0 auto; }

    /* Landing (empty) state centers everything */
    .app[data-state="landing"] .stream { justify-content: center; align-items: center; }
    .app[data-state="landing"] .stream-inner { display: flex; flex-direction: column; align-items: center; }
    .app[data-state="chatting"] .hero { display: none; }

    .hero { text-align: center; margin-bottom: 26px; user-select: none; }
    .hero h1 {
      margin: 0 0 8px; font-size: 26px; font-weight: 600; letter-spacing: -0.01em;
    }
    .hero h1 .ivy { color: var(--accent-soft); }
    .hero p { margin: 0; color: var(--text-dim); font-size: 15px; }

    /* Messages */
    .msg { display: flex; margin: 18px 0; animation: rise .3s ease both; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 80%;
      padding: 13px 16px;
      border-radius: 16px;
      font-size: 15px; line-height: 1.55;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #0c130a;
      border-bottom-right-radius: 5px;
      font-weight: 500;
    }
    .msg.bot .bubble {
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }
    .msg.bot.error .bubble { border-color: rgba(217,138,106,.4); color: #f0c4b3; }
    .bubble a { color: var(--accent-soft); text-decoration: underline; text-underline-offset: 2px; }
    .bubble strong { font-weight: 700; }

    .cal-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 12px; padding: 9px 14px;
      background: var(--accent); color: #0c130a;
      border-radius: 10px; text-decoration: none;
      font-weight: 600; font-size: 14px;
      transition: background .18s ease;
    }
    .cal-btn:hover { background: var(--accent-soft); }
    .cal-btn svg { width: 15px; height: 15px; }

    /* typing indicator */
    .typing { display: inline-flex; gap: 5px; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent-soft);
      animation: blink 1.3s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .18s; }
    .typing span:nth-child(3) { animation-delay: .36s; }

    /* ---------- Composer ---------- */
    .composer-wrap { padding: 18px 20px 24px; }
    .app[data-state="landing"] .composer-wrap {
      position: absolute; left: 0; right: 0; bottom: 0;
      /* in landing state composer sits a touch below center via the stream centering;
         keep it docked but visually low — handled by stream centering above */
    }
    .composer {
      width: 100%; max-width: 760px; margin: 0 auto;
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      padding: 8px 8px 8px 18px;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .composer:focus-within {
      border-color: rgba(127,174,78,.55);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    .composer textarea {
      flex: 1 1 auto;
      resize: none; border: none; outline: none; background: transparent;
      color: var(--text); font: inherit; font-size: 16px; line-height: 1.5;
      padding: 9px 0; max-height: 180px;
    }
    .composer textarea::placeholder { color: var(--text-faint); }
    .send {
      flex: 0 0 auto;
      width: 42px; height: 42px; border: none; border-radius: 12px;
      background: var(--accent); color: #0c130a;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .18s ease, opacity .18s ease, transform .1s ease;
    }
    .send:hover { background: var(--accent-soft); }
    .send:active { transform: scale(.94); }
    .send:disabled { background: var(--surface-3); color: var(--text-faint); cursor: default; }
    .send svg { width: 19px; height: 19px; }

    /* ---------- Microphone Button (voice architecture — hidden until enabled) ---------- */
    .mic {
      flex: 0 0 auto;
      width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 12px;
      background: transparent; color: var(--text-dim);
      display: inline-flex !important; /* always visible — cannot be overridden */
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, color .18s ease, transform .1s ease;
    }
    .mic:hover {
      background: var(--surface-3);
      border-color: var(--line-strong);
      color: var(--text);
    }
    .mic:active { transform: scale(.94); }
    .mic svg { width: 18px; height: 18px; }
    /* Pulse ring while recording */
    .mic.recording {
      border-color: var(--danger);
      color: var(--danger);
      animation: mic-pulse 1.2s infinite ease-in-out;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(217,138,106,0); }
      50%       { box-shadow: 0 0 0 6px rgba(217,138,106,0.28); }
    }
    /* voice-enabled: accent the mic button to signal it is live */
    .voice-ready .mic { border-color: rgba(127,174,78,.45); color: var(--accent-soft); }
    .voice-ready .mic:hover { background: var(--accent-glow); border-color: rgba(127,174,78,.7); }

    /* ---------- Voice toast ---------- */
    .voice-toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--surface-3); border: 1px solid var(--line-strong);
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      padding: 9px 18px; border-radius: 24px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      opacity: 0; pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .voice-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .voice-toast svg { width: 14px; height: 14px; flex: 0 0 auto; color: var(--accent-soft); }

    /* ---------- Model Selector ---------- */
    .model-bar {
      width: 100%; max-width: 760px; margin: 0 auto 10px;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transform: translateY(4px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: none;
    }
    .model-bar.loaded { opacity: 1; transform: none; pointer-events: auto; }
    .model-bar-label {
      font-size: 12px; color: var(--text-faint);
      white-space: nowrap; user-select: none; flex: 0 0 auto;
    }
    .model-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .model-pill {
      padding: 5px 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: transparent;
      color: var(--text-dim);
      font: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, color .15s ease, transform .1s ease;
      white-space: nowrap;
    }
    .model-pill:hover {
      background: var(--surface-3);
      border-color: var(--line-strong);
      color: var(--text);
    }
    .model-pill:active { transform: scale(.96); }
    .model-pill.active {
      background: var(--accent-glow);
      border-color: rgba(127,174,78,.55);
      color: var(--accent-soft);
    }

    .hint { max-width: 760px; margin: 8px auto 0; text-align: center;
            font-size: 12px; color: var(--text-faint); }


    /* scrollbar */
    .stream::-webkit-scrollbar { width: 10px; }
    .stream::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }

    /* overlay for mobile drawer */
    .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 20; }

    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }

    /* ---------- Responsive ---------- */
    @media (max-width: 820px) {
      .topbar { display: flex; }
      .sidebar {
        position: fixed; inset: 0 auto 0 0; height: 100dvh;
        transform: translateX(-100%); transition: transform .25s ease;
        box-shadow: 0 0 40px rgba(0,0,0,.5);
      }
      .app.drawer-open .sidebar { transform: none; }
      .app.drawer-open .scrim { display: block; }
      .bubble { max-width: 90%; }
      .hero h1 { font-size: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>

<body>
  <div class="app" id="app" data-state="landing">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo-card">
          <img src="{{ url_for('static', filename='ivylogo.png') }}" alt="Internetworks logo" />
        </div>
        <div class="wordmark">IVY</div>
      </div>

      <button class="new-chat" id="newChat" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <nav class="nav">
        <!-- EDIT THESE HREFS -->
        <a href="https://internetworks.io/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.7 2.5 15.3 0 18M12 3c-2.5 2.7-2.5 15.3 0 18"/></svg>
          Website
        </a>
        <a href="https://medium.com/@muizznaveed" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H11v16H4.5A1.5 1.5 0 0 1 3 18.5z"/><path d="M21 5.5A1.5 1.5 0 0 0 19.5 4H13v16h6.5a1.5 1.5 0 0 0 1.5-1.5z"/></svg>
          Featured Blogs
        </a>
        <a href="https://www.linkedin.com/company/inter-networks-io/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM8.34 18.34V9.99H5.67v8.35zM7 8.82a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1m11.34 9.52v-4.58c0-2.45-1.31-3.59-3.05-3.59a2.63 2.63 0 0 0-2.39 1.31V9.99h-2.67v8.35h2.67v-4.41c0-1.16.22-2.29 1.66-2.29s1.44 1.33 1.44 2.36v4.34z"/></svg>
          LinkedIn
        </a>
      </nav>
    </aside>

    <div class="scrim" id="scrim"></div>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="icon-btn" id="menuBtn" type="button" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <strong style="font-weight:600;letter-spacing:.15em;font-size:14px;">IVY</strong>
      </header>

      <section class="stream" id="stream" aria-live="polite">
        <div class="stream-inner" id="streamInner">
          <div class="hero">
            <h1>Ask <span class="ivy">IVY</span> anything</h1>
            <p>Your assistant for everything Internetworks — services, team, and meetings.</p>
          </div>
        </div>
      </section>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Ask anything" autocomplete="off" aria-label="Message"></textarea>
          <!-- Microphone button — always visible; shows a "coming soon" toast
               when voice is disabled, wires up STT when voice is enabled. -->
          <button class="mic" id="micBtn" type="button" aria-label="Voice input" title="Voice input" style="display:inline-flex">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="11" rx="3"/>
              <path d="M5 10a7 7 0 0 0 14 0"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
          <button class="send" id="send" type="button" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
          </button>
        </div>
        <!-- Model selector bar — populated dynamically from GET /models -->
        <div class="model-bar" id="modelBar" role="group" aria-label="AI model selector">
          <span class="model-bar-label">Model:</span>
          <div class="model-pills" id="modelPills"></div>
        </div>
        <div class="hint">IVY can make mistakes. Verify important details.</div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      var app        = document.getElementById("app");
      var stream     = document.getElementById("stream");
      var inner      = document.getElementById("streamInner");
      var input      = document.getElementById("input");
      var sendBtn    = document.getElementById("send");
      var newChat    = document.getElementById("newChat");
      var menuBtn    = document.getElementById("menuBtn");
      var scrim      = document.getElementById("scrim");

      var busy = false;

      /* ----- session identity (sent with every /chat request) ----- */
      function getOrCreateSessionId() {
        var sid = sessionStorage.getItem("ivy_session_id");
        if (!sid) {
          // crypto.randomUUID() is available in all modern browsers
          sid = (typeof crypto !== "undefined" && crypto.randomUUID)
            ? crypto.randomUUID()
            : Math.random().toString(36).slice(2) + Date.now().toString(36);
          sessionStorage.setItem("ivy_session_id", sid);
        }
        return sid;
      }
      var ivySessionId = getOrCreateSessionId();


      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
      // Escape first, then apply a tiny safe formatter: links + **bold** + newlines.
      function format(text) {
        var html = escapeHtml(text);
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/(https?:\/\/[^\s<]+)/g, function (url) {
          return '<a href="' + url + '" target="_blank" rel="noopener">' + url + "</a>";
        });
        html = html.replace(/\n/g, "<br>");
        return html;
      }

      function setState(s) { app.setAttribute("data-state", s); }

      function scrollDown() { stream.scrollTop = stream.scrollHeight; }

      function autoGrow() {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 180) + "px";
        sendBtn.disabled = input.value.trim().length === 0 || busy;
      }

      function addMessage(role, html, opts) {
        opts = opts || {};
        var wrap = document.createElement("div");
        wrap.className = "msg " + role + (opts.error ? " error" : "");
        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = html;
        wrap.appendChild(bubble);
        inner.appendChild(wrap);
        scrollDown();
        return bubble;
      }

      function addTyping() {
        var wrap = document.createElement("div");
        wrap.className = "msg bot";
        wrap.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
        inner.appendChild(wrap);
        scrollDown();
        return wrap;
      }

      function renderBot(data) {
        // Calendly / meeting response
        if (data && data.type === "calendly_link") {
          var msg = format(data.message || "You can book a meeting with our team.");
          if (data.url) {
            msg += '<a class="cal-btn" href="' + escapeHtml(data.url) + '" target="_blank" rel="noopener">' +
                   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>' +
                   'Book a meeting</a>';
          }
          addMessage("bot", msg);
          return;
        }
        // Normal / fallback response
        var text = (data && data.response) ? data.response : "I didn't quite get a response. Please try again.";
        addMessage("bot", format(text));
      }

      /* ----- Model selector state (session-persistent) ----- */
      var selectedModel = null; // null = use backend default (Gemma)

      (function initModels() {
        var modelBar   = document.getElementById("modelBar");
        var pillsWrap  = document.getElementById("modelPills");

        fetch("/models")
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (!data || !Array.isArray(data.models) || data.models.length === 0) return;

            // Restore persisted choice from sessionStorage (same tab session only).
            var stored = sessionStorage.getItem("ivy_model");
            var validIds = data.models.map(function (m) { return m.id; });
            selectedModel = (stored && validIds.indexOf(stored) !== -1) ? stored : data.default;

            // Build pill buttons.
            data.models.forEach(function (model) {
              var btn = document.createElement("button");
              btn.type = "button";
              btn.className = "model-pill" + (model.id === selectedModel ? " active" : "");
              btn.textContent = model.label;
              btn.dataset.modelId = model.id;
              btn.setAttribute("aria-pressed", model.id === selectedModel ? "true" : "false");
              btn.setAttribute("title", model.id);

              btn.addEventListener("click", function () {
                selectedModel = model.id;
                sessionStorage.setItem("ivy_model", selectedModel);
                // Update active state on all pills.
                pillsWrap.querySelectorAll(".model-pill").forEach(function (p) {
                  var active = p.dataset.modelId === selectedModel;
                  p.classList.toggle("active", active);
                  p.setAttribute("aria-pressed", active ? "true" : "false");
                });
              });

              pillsWrap.appendChild(btn);
            });

            // Fade the bar in now that it's populated.
            modelBar.classList.add("loaded");
          })
          .catch(function (err) {
            // Network error — silently ignore; selectedModel stays null = Gemma default.
            console.debug("[IVY Models] Could not fetch /models:", err);
          });
      })();

      /* ----- send ----- */
      async function send() {
        var text = input.value.trim();
        if (!text || busy) return;

        if (app.getAttribute("data-state") === "landing") setState("chatting");

        addMessage("user", escapeHtml(text).replace(/\n/g, "<br>"));
        input.value = "";
        autoGrow();

        busy = true;
        sendBtn.disabled = true;
        var typing = addTyping();

        try {
          // Build the payload. Always include message and session_id.
          // Include model only when the user has explicitly chosen one.
          // Omitting model means the backend will use its default (Gemma).
          var payload = { message: text, session_id: ivySessionId };
          if (selectedModel) { payload.model = selectedModel; }

          var res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          var data = null;
          try { data = await res.json(); } catch (e) { data = null; }

          typing.remove();

          if (!res.ok) {
            var em = (data && data.error) ? data.error :
                     (res.status === 429 ? "You're sending messages too quickly. Please wait a moment and try again."
                                         : "Something went wrong. Please try again.");
            addMessage("bot", format(em), { error: true });
          } else {
            renderBot(data);
          }
        } catch (err) {
          typing.remove();
          addMessage("bot", "I couldn't reach the server. Check your connection and try again.", { error: true });
        } finally {
          busy = false;
          autoGrow();
          input.focus();
        }
      }

      /* ----- new chat ----- */
      function reset() {
        inner.innerHTML =
          '<div class="hero"><h1>Ask <span class="ivy">IVY</span> anything</h1>' +
          '<p>Your assistant for everything Internetworks — services, team, and meetings.</p></div>';
        setState("landing");
        input.value = "";
        autoGrow();
        input.focus();
        closeDrawer();
      }

      /* ----- mobile drawer ----- */
      function openDrawer()  { app.classList.add("drawer-open"); }
      function closeDrawer() { app.classList.remove("drawer-open"); }

      /* ----- events ----- */
      input.addEventListener("input", autoGrow);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });
      sendBtn.addEventListener("click", send);
      newChat.addEventListener("click", reset);
      menuBtn.addEventListener("click", openDrawer);
      scrim.addEventListener("click", closeDrawer);

      autoGrow();
      input.focus();

      // ----------------------------------------------------------------
      // Voice initialisation — runs once on page load.
      // The mic button is always visible. Behaviour depends on voice status:
      //   voice_enabled=false → clicking shows a "coming soon" toast
      //   voice_enabled=true  → clicking starts the STT recording flow
      // This block never touches the text chat send() path.
      // ----------------------------------------------------------------
      (function initVoice() {
        var micBtn   = document.getElementById("micBtn");
        var composer = document.querySelector(".composer");

        // Inject the toast element once.
        var toast = document.createElement("div");
        toast.className = "voice-toast";
        toast.id = "voiceToast";
        toast.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
          + '<rect x="9" y="2" width="6" height="11" rx="3"/>'
          + '<path d="M5 10a7 7 0 0 0 14 0"/>'
          + '<line x1="12" y1="19" x2="12" y2="22"/>'
          + '<line x1="8" y1="22" x2="16" y2="22"/>'
          + '</svg>'
          + '<span id="voiceToastMsg">Voice input is coming soon</span>';
        document.body.appendChild(toast);

        var toastTimer = null;
        // showToast(msg) — msg is optional; defaults to "coming soon" text.
        function showToast(msg) {
          var msgEl = document.getElementById("voiceToastMsg");
          if (msgEl) msgEl.textContent = msg || "Voice input is coming soon";
          toast.classList.add("show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 2800);
        }

        // ----------------------------------------------------------------
        // MediaRecorder state
        // ----------------------------------------------------------------
        var mediaRecorder = null;
        var audioChunks   = [];
        var isRecording   = false;

        async function startRecording() {
          try {
            var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks   = [];

            mediaRecorder.ondataavailable = function (e) {
              if (e.data && e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async function () {
              // Stop all tracks so the browser mic indicator goes away.
              stream.getTracks().forEach(function (t) { t.stop(); });
              var audioBlob = new Blob(audioChunks, { type: "audio/webm" });
              await sendAudioForTranscription(audioBlob);
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add("recording");
            micBtn.title = "Stop recording";
            showToast("Recording… click mic to stop");
          } catch (err) {
            console.error("[IVY Voice] Mic access error:", err);
            if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
              showToast("Microphone access denied");
            } else {
              showToast("Could not access microphone");
            }
          }
        }

        function stopRecording() {
          if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove("recording");
            micBtn.title = "Start voice input";
          }
        }

        async function sendAudioForTranscription(audioBlob) {
          showToast("Transcribing…");

          var formData = new FormData();
          formData.append("audio", audioBlob, "recording.webm");

          try {
            var res  = await fetch("/transcribe", { method: "POST", body: formData });
            var data = null;
            try { data = await res.json(); } catch (e) { data = null; }

            if (res.ok && data && data.text) {
              // Insert the transcript into the chat input and trigger autoGrow
              // so the send button enables and the textarea resizes.
              input.value = data.text;
              autoGrow();
              input.focus();
              // Hide the toast — the text is now visible in the input.
              toast.classList.remove("show");
            } else {
              showToast((data && data.error) ? data.error : "Transcription failed");
            }
          } catch (err) {
            console.error("[IVY Voice] Transcription error:", err);
            showToast("Transcription failed");
          }
        }

        // ----------------------------------------------------------------
        // Boot: check voice status then attach the appropriate handler.
        // ----------------------------------------------------------------
        fetch("/voice-status")
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data && data.voice_enabled === true) {
              // Voice is live — accent the button and wire up recording.
              composer.classList.add("voice-ready");
              micBtn.title = "Start voice input";
              micBtn.addEventListener("click", function () {
                if (!isRecording) {
                  startRecording();
                } else {
                  stopRecording();
                }
              });
            } else {
              // Voice is disabled — show a friendly "coming soon" toast.
              micBtn.title = "Voice input — coming soon";
              micBtn.addEventListener("click", function () { showToast(); });
            }
          })
          .catch(function () {
            // Network error — fall back to the "coming soon" behaviour.
            micBtn.title = "Voice input — coming soon";
            micBtn.addEventListener("click", function () { showToast(); });
          });
      })();
    })();
  </script>
</body>
</html>
